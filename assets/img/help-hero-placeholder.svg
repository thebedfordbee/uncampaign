<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Help page hero placeholder — replace with final photograph">
  <title>Help Hero — Placeholder Image</title>

  <!-- Background -->
  <rect width="1200" height="900" fill="#F8F5EF"/>

  <!-- Subtle grid -->
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#E8E3DA" stroke-width="1"/>
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#E8E3DA" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="900" stroke="#E8E3DA" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="900" stroke="#E8E3DA" stroke-width="1"/>

  <!-- Mobile safe area: middle 70% width / 75% height -->
  <!-- 70% of 1200 = 840, offset = 180; 75% of 900 = 675, offset = 112.5 -->
  <rect x="180" y="113" width="840" height="675" rx="6" fill="none" stroke="#C8C2B8" stroke-width="1.5" stroke-dasharray="8 6"/>

  <!-- Main title -->
  <text x="600" y="350" font-family="Georgia, 'Times New Roman', serif" font-size="32" fill="#3E5240" text-anchor="middle" font-weight="bold">Hero Image Placeholder</text>

  <!-- Divider -->
  <line x1="340" y1="380" x2="860" y2="380" stroke="#D8D2C8" stroke-width="1"/>

  <!-- Spec lines -->
  <text x="600" y="420" font-family="Georgia, serif" font-size="18" fill="#5A554E" text-anchor="middle">Final Image: 1200 × 900 px</text>
  <text x="600" y="453" font-family="Georgia, serif" font-size="18" fill="#5A554E" text-anchor="middle">Aspect Ratio: 4:3</text>
  <text x="600" y="486" font-family="Georgia, serif" font-size="18" fill="#5A554E" text-anchor="middle">Keep Important Content Centered</text>
  <text x="600" y="519" font-family="Georgia, serif" font-size="18" fill="#5A554E" text-anchor="middle">Mobile Safe Area: Middle 70% Width / 75% Height</text>

  <!-- Safe area label -->
  <text x="600" y="148" font-family="Georgia, serif" font-size="12" fill="#B8B2A8" text-anchor="middle" letter-spacing="2">MOBILE SAFE AREA</text>

  <!-- Bottom note -->
  <line x1="0" y1="860" x2="1200" y2="860" stroke="#E8E3DA" stroke-width="1"/>
  <text x="600" y="884" font-family="Georgia, serif" font-size="12" fill="#B8B2A8" text-anchor="middle" font-style="italic">Placeholder — replace with final photograph before launch</text>
</svg>
