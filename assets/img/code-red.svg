<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 533" role="img" aria-label="Stylized open book representing the 762-page Bedford Town Code, titled Code Red">
  <!-- Background -->
  <rect width="800" height="533" fill="#2B2B2B"/>
  <!-- Book drop shadow -->
  <rect x="156" y="72" width="496" height="402" rx="10" fill="rgba(0,0,0,0.28)"/>
  <!-- Book body -->
  <rect x="150" y="64" width="500" height="402" rx="8" fill="#F8F5EF"/>
  <!-- Book spine -->
  <rect x="396" y="64" width="8" height="402" fill="#E0DBD3"/>
  <!-- Red header band -->
  <rect x="150" y="64" width="500" height="64" rx="6" fill="#9b2020"/>
  <rect x="150" y="100" width="500" height="28" fill="#9b2020"/>
  <!-- CODE RED lettering -->
  <text x="400" y="108" font-family="Georgia,'Times New Roman',serif" font-size="28" fill="#ffffff" text-anchor="middle" letter-spacing="8" font-weight="bold">CODE RED</text>
  <!-- Hairline below band -->
  <rect x="150" y="128" width="500" height="1.5" fill="#E0DBD3"/>
  <!-- Section-symbol watermarks -->
  <text x="286" y="355" font-family="Georgia,'Times New Roman',serif" font-size="210" fill="#3E5240" text-anchor="middle" opacity="0.05">§</text>
  <text x="514" y="355" font-family="Georgia,'Times New Roman',serif" font-size="210" fill="#3E5240" text-anchor="middle" opacity="0.05">§</text>
  <!-- Byline -->
  <text x="400" y="174" font-family="Georgia,'Times New Roman',serif" font-size="11" fill="#7B8C79" text-anchor="middle" letter-spacing="3">TOWN OF BEDFORD, NEW YORK</text>
  <!-- Divider -->
  <rect x="220" y="186" width="360" height="1" fill="#E0DBD3"/>
  <!-- 762 -->
  <text x="400" y="264" font-family="Georgia,'Times New Roman',serif" font-size="88" fill="#3E5240" text-anchor="middle">762</text>
  <!-- pages label -->
  <text x="400" y="291" font-family="Georgia,'Times New Roman',serif" font-size="13" fill="#7B8C79" text-anchor="middle" letter-spacing="3">PAGES</text>
  <!-- Divider -->
  <rect x="220" y="306" width="360" height="1" fill="#E0DBD3"/>
  <!-- Subtitle -->
  <text x="400" y="336" font-family="Georgia,'Times New Roman',serif" font-size="13" fill="#7B8C79" text-anchor="middle">Ten of them are in here somewhere.</text>
  <!-- Ruled lines left page -->
  <rect x="168" y="366" width="202" height="7" rx="3" fill="#E0DBD3" opacity="0.65"/>
  <rect x="168" y="381" width="178" height="7" rx="3" fill="#E0DBD3" opacity="0.65"/>
  <rect x="168" y="396" width="196" height="7" rx="3" fill="#E0DBD3" opacity="0.65"/>
  <rect x="168" y="411" width="166" height="7" rx="3" fill="#E0DBD3" opacity="0.65"/>
  <rect x="168" y="426" width="186" height="7" rx="3" fill="#E0DBD3" opacity="0.65"/>
  <rect x="168" y="441" width="172" height="7" rx="3" fill="#E0DBD3" opacity="0.65"/>
  <!-- Ruled lines right page -->
  <rect x="418" y="366" width="210" height="7" rx="3" fill="#E0DBD3" opacity="0.65"/>
  <rect x="418" y="381" width="190" height="7" rx="3" fill="#E0DBD3" opacity="0.65"/>
  <rect x="418" y="396" width="208" height="7" rx="3" fill="#E0DBD3" opacity="0.65"/>
  <rect x="418" y="411" width="174" height="7" rx="3" fill="#E0DBD3" opacity="0.65"/>
  <rect x="418" y="426" width="198" height="7" rx="3" fill="#E0DBD3" opacity="0.65"/>
  <rect x="418" y="441" width="182" height="7" rx="3" fill="#E0DBD3" opacity="0.65"/>
</svg>
