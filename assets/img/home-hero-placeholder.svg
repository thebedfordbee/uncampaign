<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" width="1600" height="1200" role="img" aria-label="Homepage hero image placeholder — replace with final photo">
  <!-- Background -->
  <rect width="1600" height="1200" fill="#EDE8DF"/>

  <!-- Rule-of-thirds composition guides -->
  <line x1="533" y1="0"    x2="533"  y2="1200" stroke="#D5CFC4" stroke-width="1.5"/>
  <line x1="1067" y1="0"   x2="1067" y2="1200" stroke="#D5CFC4" stroke-width="1.5"/>
  <line x1="0"   y1="400"  x2="1600" y2="400"  stroke="#D5CFC4" stroke-width="1.5"/>
  <line x1="0"   y1="800"  x2="1600" y2="800"  stroke="#D5CFC4" stroke-width="1.5"/>

  <!-- Safe subject zone -->
  <rect x="200" y="160" width="1200" height="880" rx="10" fill="none" stroke="#C4BCB0" stroke-width="2" stroke-dasharray="18,8"/>
  <text x="800" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#C4BCB0" letter-spacing="0.12em">SAFE ZONE · 200px MARGIN</text>

  <!-- Person silhouette (suggested subject placement) -->
  <ellipse cx="800" cy="400" rx="64" ry="75" fill="none" stroke="#BAB0A4" stroke-width="2.5"/>
  <path d="M 672 600 Q 710 500 800 488 Q 890 500 928 600" fill="none" stroke="#BAB0A4" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Primary label -->
  <text x="800" y="700" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="46" fill="#5A5048">Homepage Hero Image</text>
  <text x="800" y="758" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="46" fill="#5A5048">Placeholder</text>

  <!-- Spec line -->
  <text x="800" y="850" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="#9E9790">1600 × 1200 px · 4:3 · PNG or JPEG</text>
  <text x="800" y="892" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#BAB0A4">Replace: assets/img/home-hero.jpg</text>
</svg>
